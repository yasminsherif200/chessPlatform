    <link rel="stylesheet" href="css/bootstrap.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/contact.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Contact</title>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="#" class="navbar-brand">Knight's Circle</a>
            <ul class="nav">
                <li class="nav-item"><a href="index.html" class="nav-link sm">Home</a></li>
                <li class="nav-item"><a href="about.html" class="nav-link">About</a></li>
                <li class="nav-item"><a href="events.html" class="nav-link">Events</a></li>
                <li class="nav-item"><a href="contact.html" class="nav-link">Contact</a></li>
            </ul>
            <button class="btn btn-orange">Join Now</button>
        </div>
    </nav>

    <div class="main">
        <div class="container">
            <div class="c-form">
                <h1>Connect with the Circle.</h1>
                <p>
                    For inquiries regarding membership, grandmaster sessions, or <br>
                    tournament hosting, please reach out to our administration.
                </p>
                <form class="text-left" action="https://formspree.io/f/xlgyvyzy" method="POST">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" class="form-control" id="name" name="name" placeholder="Yasmin Sherif">
                    </div>
                    <div class="form-group">
                    <label for="exampleInputEmail1">Email</label>
                    <input type="email" class="form-control" id="exampleInputEmail1" name="email" aria-describedby="emailHelp" placeholder="yasmin@example.com">
                    </div>
                    <div class="form-group">
                        <label for="exampleFormControlTextarea1">Message</label>
                        <textarea class="form-control" id="exampleFormControlTextarea1" rows="3" name="message" placeholder="Let's build something..."></textarea>
                    </div>
                    <button type="submit" class="cntct-btn btn">Send Message</button>
                </form>
            </div>
        </div>
    </div>

    <footer class="py-4">
        <div class="container d-flex justify-content-between align-items-center flex-wrap">
            <div class="footer-name">Knight's Circle</div>
            <div class="footer-copyright">© 2026 Knight's Circle. All rights reserved.</div>
